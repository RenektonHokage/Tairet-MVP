# Minimal Cursor bridge for Tairet.
# Canonical agent policy lives outside this file to avoid duplicated rules.

version: 1
status: current_bridge

canonical:
  repositoryInstructions: "../AGENTS.md"
  accessCoreIndex: "../docs/access-core/INDEX.md"

rules:
  - "Read AGENTS.md before repository work."
  - "For Access Core, use docs/access-core/INDEX.md and follow only the minimum reading route required by the task."
  - "Respect the exact ASK or CODE scope; repository capability is not authorization."
  - "Never infer production, deployment, activation, or authority from main."
  - "Stop when a material contradiction requires a technical decision or when completion requires scope expansion."
  - "Never expose secrets, credentials, payment data, private email addresses, buyer PII, or full access/check-in tokens."

stops:
  - SCOPE_EXPANSION_REQUIRED
  - REPOSITORY_STATE_MISMATCH
  - REMOTE_ADVANCED
  - PRODUCTION_STATE_UNKNOWN
  - TECHNICAL_DECISION_REQUIRED
